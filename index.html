<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>古王国パズル記録ツール v15</title>
<style>
    body { font-family: sans-serif; padding: 15px; max-width: 1100px; margin: 0 auto; background-color: #2c2c2c; color: #fff; }
    h1 { font-size: 20px; text-align: center; color: #e0e0e0; margin-bottom: 20px; }
    .main-container { display: flex; flex-wrap: wrap; gap: 25px; justify-content: center; align-items: flex-start; }
    
    .control-panel { background: #3d3d3d; padding: 20px; border-radius: 8px; flex: 1; min-width: 320px; box-sizing: border-box; }
    .input-row { display: flex; gap: 10px; margin-bottom: 15px; }
    .input-group { flex: 1; }
    label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 13px; color: #ffcc80; }
    input[type="date"], select { padding: 8px; font-size: 14px; width: 100%; box-sizing: border-box; border-radius: 5px; border: 1px solid #555; background: #eee; color: #000; font-weight: bold; }
    .locations-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; background: #2a2a2a; padding: 15px; border-radius: 8px; border: 1px solid #555; }
    .loc-item { display: flex; flex-direction: column; }
    .loc-item label { color: #fff; margin-bottom: 3px; font-size: 12px; }
    
    .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
    button { padding: 12px; font-size: 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: 0.2s; }
    button:hover { opacity: 0.9; transform: translateY(-2px); }
    .image-btn { background: linear-gradient(135deg, #ff9800, #f57c00); color: white; font-size: 16px; }
    .save-btn { background-color: #4CAF50; color: white; }
    .export-btn { background-color: #2196F3; color: white; }
    .import-btn { background-color: #9c27b0; color: white; }

    .map-container { flex: 1.5; min-width: 400px; display: flex; justify-content: center; }
    .map-wrapper { position: relative; width: 100%; border: 3px solid #555; border-radius: 8px; background-color: #000; display: inline-block; overflow: hidden; }
    .map-bg { width: 100%; height: auto; display: block; user-select: none; }
    
    .map-node {
        position: absolute; 
        width: 10%; 
        aspect-ratio: 1 / 1; 
        min-width: 45px;
        transform: translate(-50%, -50%); 
        background-color: rgba(0, 0, 0, 0.4);
        border: 2px solid #fff; border-radius: 10px; 
        display: flex; align-items: center; justify-content: center;
        background-size: contain; 
        background-repeat: no-repeat; background-position: center; cursor: pointer;
        box-shadow: 0 2px 5px rgba(0,0,0,0.5);
    }
    .node-label { position: absolute; bottom: -22px; font-size: 14px; font-weight: bold; color: #fff; text-shadow: 1px 1px 2px #000, -1px -1px 2px #000; pointer-events: none; }
    
    .history-panel { background: #3d3d3d; padding: 20px; border-radius: 8px; margin-top: 25px; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 850px; font-size: 13px; color: #333; }
    th, td { border: 1px solid #aaa; padding: 8px; text-align: center; background: #fff; }
    th { background-color: #ffcc80; }
    .delete-btn { background-color: #f44336; color: white; padding: 4px 8px; border-radius: 3px; cursor: pointer; font-size: 11px; }
</style>
</head>
<body>

<h1>古王国パズル記録ツール v15 (座標完成版)</h1>

<div class="main-container">
    <div class="control-panel">
        <div class="input-row">
            <div class="input-group"><label>日付:</label><input type="date" id="record-date"></div>
            <div class="input-group"><label>Boss位置 (背景切替):</label>
                <select id="boss-loc" onchange="changeBackground()"><option value="不明">-</option><option value="E">E. 廃墟の街</option><option value="G">G. 廃墟の庭園</option><option value="I">I. 採石場</option><option value="J">J. 盗賊</option></select>
            </div>
        </div>
        <div class="locations-grid">
            <div class="loc-item"><label>A ベース</label><select id="locA" onchange="syncToMap('A')"><option value="-">-</option><option value="赤">赤</option><option value="黄">黄</option><option value="緑">緑</option><option value="青">青</option></select></div>
            <div class="loc-item"><label>B 井戸</label><select id="locB" onchange="syncToMap('B')"><option value="-">-</option><option value="赤">赤</option><option value="黄">黄</option><option value="緑">緑</option><option value="青">青</option></select></div>
            <div class="loc-item"><label>C スフィンクス</label><select id="locC" onchange="syncToMap('C')"><option value="-">-</option><option value="赤">赤</option><option value="黄">黄</option><option value="緑">緑</option><option value="青">青</option></select></div>
            <div class="loc-item"><label>D セムカリス</label><select id="locD" onchange="syncToMap('D')"><option value="-">-</option><option value="赤">赤</option><option value="黄">黄</option><option value="緑">緑</option><option value="青">青</option></select></div>
            <div class="loc-item"><label>E 廃墟の街</label><select id="locE" onchange="syncToMap('E')"><option value="-">-</option><option value="赤">赤</option><option value="黄">黄</option><option value="緑">緑</option><option value="青">青</option></select></div>
            <div class="loc-item"><label>H 要塞</label><select id="locH" onchange="syncToMap('H')"><option value="-">-</option><option value="赤">赤</option><option value="黄">黄</option><option value="緑">緑</option><option value="青">青</option></select></div>
            <div class="loc-item"><label>I 採石場</label><select id="locI" onchange="syncToMap('I')"><option value="-">-</option><option value="赤">赤</option><option value="黄">黄</option><option value="緑">緑</option><option value="青">青</option></select></div>
            <div class="loc-item"><label>J 盗賊</label><select id="locJ" onchange="syncToMap('J')"><option value="-">-</option><option value="赤">赤</option><option value="黄">黄</option><option value="緑">緑</option><option value="青">青</option></select></div>
        </div>
        
        <div class="btn-group">
            <button class="image-btn" onclick="exportHighQualityImage()">📸 超高画質で画像を保存</button>
            <button class="save-btn" onclick="saveData()">💾 データを表に保存する</button>
        </div>
        
        <div class="btn-group" style="margin-top:20px; border-top:1px solid #555; padding-top:15px;">
            <button class="export-btn" onclick="exportToCSV()">CSVを書き出す</button>
            <button class="import-btn" onclick="document.getElementById('csvFile').click()">CSVを読み込む</button>
            <input type="file" id="csvFile" style="display:none" accept=".csv" onchange="importCSV(this)">
        </div>
    </div>
    
    <div class="map-container">
        <div class="map-wrapper" id="capture-area">
            <img src="map_none.webp" id="main-bg" class="map-bg">
            <div class="map-node" style="top: 86%; left: 50%;" id="nodeA" onclick="cycleLoc('A')"><span class="node-label">A</span></div>
            <div class="map-node" style="top: 65%; left: 50%;" id="nodeB" onclick="cycleLoc('B')"><span class="node-label">B</span></div>
            <div class="map-node" style="top: 80%; left: 64%;" id="nodeC" onclick="cycleLoc('C')"><span class="node-label">C</span></div>
            <div class="map-node" style="top: 60%; left: 68%;" id="nodeD" onclick="cycleLoc('D')"><span class="node-label">D</span></div>
            <div class="map-node" style="top: 45%; left: 28%;" id="nodeE" onclick="cycleLoc('E')"><span class="node-label">E</span></div>
            <div class="map-node" style="top: 45%; left: 50%;" id="nodeH" onclick="cycleLoc('H')"><span class="node-label">H</span></div>
            <div class="map-node" style="top: 17%; left: 50%;" id="nodeI" onclick="cycleLoc('I')"><span class="node-label">I</span></div>
            <div class="map-node" style="top: 80%; left: 36%;" id="nodeJ" onclick="cycleLoc('J')"><span class="node-label">J</span></div>
        </div>
    </div>
</div>

<div class="history-panel"><h3>記録履歴</h3><table id="h-table"><thead><tr><th>日付</th><th>ボス</th><th>A</th><th>B</th><th>C</th><th>D</th><th>E</th><th>F</th><th>G</th><th>H</th><th>I</th><th>J</th><th>操作</th></tr></thead><tbody id="history-body"></tbody></table></div>

<script>
    document.getElementById('record-date').valueAsDate = new Date();
    const patterns = ['-', '赤', '黄', '緑', '青'];
    const imgs = { '赤': '鳥.png', '黄': 'カブトムシ.png', '緑': '蛇.png', '青': '猫.png' };
    const bgImages = { 'E': 'map_E.webp', 'G': 'map_G.webp', 'I': 'map_I.webp', 'J': 'map_J.webp', '不明': 'map_none.webp' };

    function changeBackground() {
        document.getElementById('main-bg').src = bgImages[document.getElementById('boss-loc').value] || 'map_none.webp';
    }
    function syncToMap(loc) {
        const val = document.getElementById('loc' + loc).value;
        document.getElementById('node' + loc).style.backgroundImage = (val === '-') ? 'none' : `url('${imgs[val]}')`;
    }
    function cycleLoc(loc) {
        const select = document.getElementById('loc' + loc);
        select.value = patterns[(patterns.indexOf(select.value) + 1) % patterns.length];
        syncToMap(loc);
    }

    async function exportHighQualityImage() {
        const dateStr = document.getElementById('record-date').value;
        const bgImg = await loadImage(document.getElementById('main-bg').src);
        
        const canvas = document.createElement('canvas');
        canvas.width = bgImg.width;
        canvas.height = bgImg.height;
        const ctx = canvas.getContext('2d');
        
        ctx.drawImage(bgImg, 0, 0);

        const locations = ['A', 'B', 'C', 'D', 'E', 'H', 'I', 'J'];
        for (let loc of locations) {
            const val = document.getElementById('loc' + loc).value;
            if (val !== '-') {
                const node = document.getElementById('node' + loc);
                const topPercent = parseFloat(node.style.top) / 100;
                const leftPercent = parseFloat(node.style.left) / 100;
                
                const boxSize = Math.min(canvas.width, canvas.height) * 0.12;
                const boxX = (canvas.width * leftPercent) - (boxSize / 2);
                const boxY = (canvas.height * topPercent) - (boxSize / 2);

                const iconImg = await loadImage(imgs[val]);
                
                const ratio = Math.min(boxSize / iconImg.width, boxSize / iconImg.height);
                const drawWidth = iconImg.width * ratio;
                const drawHeight = iconImg.height * ratio;
                
                const drawX = boxX + (boxSize - drawWidth) / 2;
                const drawY = boxY + (boxSize - drawHeight) / 2;

                ctx.drawImage(iconImg, drawX, drawY, drawWidth, drawHeight);
            }
        }
        const link = document.createElement('a');
        link.download = `soulsteel_${dateStr}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
    }

    function loadImage(src) {
        return new Promise((resolve, reject) => {
            const img = new Image(); img.onload = () => resolve(img); img.onerror = reject; img.src = src;
        });
    }

    function saveData() {
        const date = document.getElementById('record-date').value;
        let data = JSON.parse(localStorage.getItem('puzzleV8')) || [];
        const oldIdx = data.findIndex(d => d.date === date);
        if (oldIdx >= 0) { if(!confirm(date + " のデータは既に存在します。上書きしてもよろしいですか？")) return; } 
        else { if(!confirm("この内容で保存しますか？")) return; }
        const rec = { date, boss: document.getElementById('boss-loc').value, A: document.getElementById('locA').value, B: document.getElementById('locB').value, C: document.getElementById('locC').value, D: document.getElementById('locD').value, E: document.getElementById('locE').value, H: document.getElementById('locH').value, I: document.getElementById('locI').value, J: document.getElementById('locJ').value };
        if (oldIdx >= 0) data[oldIdx] = rec; else data.push(rec);
        data.sort((a, b) => new Date(b.date) - new Date(a.date));
        localStorage.setItem('puzzleV8', JSON.stringify(data));
        render(); alert("保存しました");
    }
    function render() {
        const data = JSON.parse(localStorage.getItem('puzzleV8')) || [];
        document.getElementById('history-body').innerHTML = data.map((r, i) => `<tr><td>${r.date}</td><td style="background:#ffe0b2">${r.boss}</td>${['A','B','C','D','E'].map(l=>`<td>${r[l]}</td>`).join('')}<td style="background:#eee">-</td><td style="background:#eee">-</td>${['H','I','J'].map(l=>`<td>${r[l]}</td>`).join('')}<td><button class="delete-btn" onclick="del(${i})">削除</button></td></tr>`).join('');
    }
    function del(i) { if(confirm("本当に削除しますか？")) { let d = JSON.parse(localStorage.getItem('puzzleV8')); d.splice(i,1); localStorage.setItem('puzzleV8', JSON.stringify(d)); render(); } }
    function exportToCSV() {
        const data = JSON.parse(localStorage.getItem('puzzleV8')) || [];
        if (data.length === 0) { alert("データがありません"); return; }
        let csv = "日付,ボス,A,B,C,D,E,F,G,H,I,J\n"; data.forEach(r => { csv += `${r.date},${r.boss},${r.A},${r.B},${r.C},${r.D},${r.E},-,-,${r.H},${r.I},${r.J}\n`; });
        const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' }); const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = `soulsteel_log.csv`; link.click();
    }
    function importCSV(input) {
        const file = input.files[0]; if (!file) return;
        const reader = new FileReader(); reader.onload = function(e) {
            const lines = e.target.result.split(/\r\n|\n/); let newData = [];
            for (let i = 1; i < lines.length; i++) { const cols = lines[i].split(','); if (cols.length < 12) continue; newData.push({ date: cols[0], boss: cols[1], A: cols[2], B: cols[3], C: cols[4], D: cols[5], E: cols[6], H: cols[9], I: cols[10], J: cols[11] }); }
            if(confirm(newData.length + "件を読み込みますか？")) { let current = JSON.parse(localStorage.getItem('puzzleV8')) || []; newData.forEach(n => { const idx = current.findIndex(c => c.date === n.date); if(idx >= 0) current[idx] = n; else current.push(n); }); current.sort((a, b) => new Date(b.date) - new Date(a.date)); localStorage.setItem('puzzleV8', JSON.stringify(current)); render(); alert("完了！"); } input.value = "";
        }; reader.readAsText(file);
    }
    window.onload = render;
</script>
</body>
</html>
